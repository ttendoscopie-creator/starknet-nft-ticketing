name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: Contracts (Cairo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Scarb
        uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: "2.9.2"

      - name: Cache Scarb target
        uses: actions/cache@v4
        with:
          path: contracts/target
          key: scarb-${{ runner.os }}-${{ hashFiles('contracts/Scarb.lock', 'contracts/Scarb.toml') }}
          restore-keys: scarb-${{ runner.os }}-

      - name: Install Starknet Foundry
        uses: foundry-rs/setup-snfoundry@v3
        with:
          starknet-foundry-version: "0.35.1"

      - name: Check formatting
        run: scarb fmt --check
        working-directory: contracts

      - name: Build contracts
        run: scarb build
        working-directory: contracts

      - name: Run tests
        run: snforge test
        working-directory: contracts

      - name: Run tests (gas report)
        run: snforge test --detailed-resources
        working-directory: contracts

      - name: Upload contract artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contract-artifacts
          path: |
            contracts/target/dev/*.contract_class.json
            contracts/target/dev/*.compiled_contract_class.json
          retention-days: 30

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npx prisma generate --schema=src/db/prisma/schema.prisma
        working-directory: backend
      - name: Security audit
        run: npm audit --audit-level=high --omit=dev
        working-directory: backend
      - run: npx tsc --noEmit
        working-directory: backend
      - name: Run tests with coverage
        run: npm test -- --run --coverage
        working-directory: backend

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Security audit
        run: npm audit --audit-level=critical --omit=dev
        working-directory: frontend

      - name: Run tests with coverage
        run: npm test -- --run --coverage
        working-directory: frontend

      - name: Type check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Build
        run: npx next build
        working-directory: frontend
